<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0f;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#13131a;border-radius:16px;border:1px solid rgba(34,197,94,0.15);overflow:hidden;max-width:560px;width:100%;">
          <tr>
            <td style="padding:32px 40px 24px;border-bottom:1px solid rgba(255,255,255,0.06);">
              <table cellpadding="0" cellspacing="0"><tr>
                <td style="background:#0f0f1a;border:1.5px solid rgba(34,197,94,0.4);border-radius:10px;width:36px;height:36px;text-align:center;vertical-align:middle;font-size:20px;">⚡</td>
                <td style="padding-left:12px;font-size:18px;font-weight:700;color:#ffffff;">AmpedMap</td>
              </tr></table>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 40px;">
              <p style="margin:0 0 8px;font-size:24px;font-weight:700;color:#ffffff;">Confirm your email</p>
              <p style="margin:0 0 28px;font-size:15px;color:rgba(255,255,255,0.5);line-height:1.6;">Click the button below to verify your email address and activate your AmpedMap account.</p>
              <table cellpadding="0" cellspacing="0" style="width:100%;">
                <tr><td align="center">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#22c55e;color:#000000;font-size:14px;font-weight:700;text-decoration:none;padding:14px 32px;border-radius:10px;">Confirm Email</a>
                </td></tr>
              </table>
              <p style="margin:24px 0 0;font-size:12px;color:rgba(255,255,255,0.25);text-align:center;">If you didn't sign up for AmpedMap, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 40px;border-top:1px solid rgba(255,255,255,0.06);">
              <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.25);text-align:center;">ampedmap.com</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
